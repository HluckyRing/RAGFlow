<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGFlow</title>
<style>
:root{--brand:#4D6BFE;--sidebar-bg:#1E2130;--main-bg:#FFFFFF;--input-bg:#F9FAFB;--bubble-user:#4D6BFE;--bubble-ai:#F9FAFB;--text-primary:#1F2937;--text-secondary:#6B7280;--border:#E5E7EB}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--text-primary);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}

.app{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;transition:width .2s,min-width .2s;overflow:hidden}
.sidebar.collapsed{width:0;min-width:0}
.sidebar-logo{padding:16px 20px;height:64px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sidebar-logo .icon{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.sidebar-logo span{color:#fff;font-size:18px;font-weight:700}
.sidebar-new{padding:12px 16px;flex-shrink:0}
.sidebar-new button{width:100%;height:40px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#D1D5DB;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sidebar-new button:hover{background:rgba(255,255,255,.1);color:#fff}
.conv-list{flex:1;overflow-y:auto;padding:4px 12px}
.conv-item{padding:6px 10px;border-radius:8px;cursor:pointer;color:#9CA3AF;font-size:13px;margin-bottom:2px;transition:all .2s;display:flex;align-items:center;gap:4px}
.conv-item:hover{background:rgba(255,255,255,.06);color:#D1D5DB}
.conv-item.active{background:rgba(77,107,254,.12);color:#fff;border-left:3px solid var(--brand);padding-left:7px}
.conv-item .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .cname-inp{flex:1;background:rgba(255,255,255,.12);border:1px solid var(--brand);border-radius:4px;color:#fff;font-size:13px;padding:2px 6px;outline:none}
.conv-item .cact{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:transparent;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.conv-item:hover .cact{color:#9CA3AF}
.conv-item .cact:hover{color:#fff;background:rgba(255,255,255,.1)}
.conv-item .cact.del:hover{background:rgba(239,68,68,.2);color:#EF4444}
.empty-hint{color:#6B7280;font-size:12px;text-align:center;padding:24px 8px}

.main{flex:1;display:flex;flex-direction:column;background:var(--main-bg);height:100vh;min-width:0}
.topbar{height:52px;padding:0 20px;display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;gap:10px}
.topbar .tbtn{width:32px;height:32px;border-radius:6px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.topbar .tbtn:hover{background:#F3F4F6}
.topbar .conv-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.topbar .file-badge{font-size:12px;padding:2px 10px;border-radius:10px;background:#EEF2FF;color:var(--brand)}

.chat-area{flex:1;overflow-y:auto;padding:20px 0}
.chat-inner{max-width:800px;margin:0 auto;padding:0 24px}
.msg{display:flex;gap:10px;margin-bottom:20px}
.msg.user{justify-content:flex-end}
.msg.user .bub{background:var(--bubble-user);color:#fff;border-radius:14px 14px 4px 14px;max-width:80%;padding:10px 16px;font-size:14px;line-height:1.6}
.msg.assistant{align-items:flex-start}
.msg.assistant .avt{width:34px;height:34px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;color:var(--brand);font-weight:700;font-size:13px;flex-shrink:0}
.msg.assistant .bub{background:var(--bubble-ai);border-radius:14px 14px 14px 4px;max-width:85%;padding:12px 16px;font-size:14px;line-height:1.7;color:var(--text-primary)}
.msg .bub p{margin:4px 0}
.msg .bub pre{background:#1E293B;border-radius:8px;padding:12px 16px;overflow-x:auto;margin:8px 0}
.msg .bub code{font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:#E2E8F0}
.msg .bub p code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.user .bub p code{background:rgba(255,255,255,.2)}

.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:#9CA3AF;animation:bounce 1.4s infinite ease-in-out both}
.typing span:nth-child(1){animation-delay:-.32s}
.typing span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);gap:12px}
.empty-state h2{font-size:22px;color:var(--text-primary)}
.empty-state .drop-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 56px;text-align:center;cursor:pointer;transition:all .3s;background:var(--input-bg)}
.empty-state .drop-zone:hover{border-color:var(--brand);background:#EEF2FF}
.empty-state .drop-zone p{font-size:14px;color:var(--text-primary)}
.empty-state .drop-zone .sub{color:var(--text-secondary);font-size:12px;margin-top:6px}

.src-box{margin-top:8px;padding:10px 14px;background:#F9FAFB;border-radius:10px;font-size:12px;color:var(--text-secondary);border:1px solid var(--border)}
.src-box .src-title{font-weight:600;color:var(--text-primary);margin-bottom:6px}
.src-box .src-item{padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.src-box .src-item:last-child{border:none}

.file-bar{padding:8px 24px 0;flex-shrink:0}
.file-bar .file-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border);background:#fff;font-size:12px;color:var(--text-secondary);cursor:pointer;transition:all .2s}
.file-bar .file-btn:hover{background:#F3F4F6}
.file-list{max-width:800px;margin:8px auto 0;padding:8px 12px;background:#F9FAFB;border-radius:8px;border:1px solid var(--border);font-size:12px;color:var(--text-secondary)}
.file-list .fl-item{padding:3px 0}
.file-list .fl-item:before{content:'📄 '}

.input-area{padding:12px 24px 20px;flex-shrink:0}
.input-row{max-width:800px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:16px;padding:6px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(77,107,254,.1)}
.input-row textarea{flex:1;border:none;outline:none;resize:none;background:transparent;font-size:14px;font-family:inherit;line-height:1.5;min-height:28px;max-height:180px;padding:6px 4px}
.input-row textarea::placeholder{color:#9CA3AF}
.input-row .ubtn{width:36px;height:36px;border:none;border-radius:10px;background:transparent;color:var(--text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.input-row .ubtn:hover{background:#E5E7EB}
.input-row .sbtn{width:36px;height:36px;border:none;border-radius:50%;background:#D1D5DB;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.input-row .sbtn.ok{background:var(--brand)}
.input-row .sbtn.ok:hover{transform:scale(1.05)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:28px 32px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:12px}
.modal p{font-size:13px;color:var(--text-secondary);margin-bottom:20px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{height:36px;padding:0 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer}
.btn-cancel{background:#F3F4F6;color:var(--text-secondary)}
.btn-ok{background:var(--brand);color:#fff}
.btn-danger{background:#EF4444;color:#fff}

.toast{position:fixed;top:20px;right:20px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;animation:slideIn .3s ease}
.toast.error{background:#EF4444}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="app">
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="icon">R</div><span>RAGFlow</span></div>
    <div class="sidebar-new"><button onclick="createNewConv()">＋ 新对话</button></div>
    <div class="conv-list" id="convList"><div class="empty-hint">暂无对话</div></div>
</aside>

<main class="main">
    <header class="topbar">
        <button class="tbtn" onclick="toggleSidebar()">☰</button>
        <span class="conv-name" id="topName">RAGFlow</span>
        <span class="file-badge hidden" id="fileBadge"></span>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h2 id="emptyTitle">RAGFlow</h2>
            <p id="emptyDesc">上传文件创建知识库，开始智能问答</p>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <p>📂 点击或拖拽上传文件</p>
                <p class="sub">支持 PDF, DOCX, XLSX, CSV, TXT, MD</p>
            </div>
        </div>
        <div class="chat-inner hidden" id="chatInner"></div>
    </div>

    <div class="file-bar hidden" id="fileBar">
        <button class="file-btn" onclick="toggleFileList()">📂 查看文件</button>
        <div class="file-list hidden" id="fileList"></div>
    </div>

    <div class="input-area hidden" id="inputArea">
        <div class="input-row">
            <textarea id="msgInput" placeholder="给 RAGFlow 发送消息..." rows="1"
                oninput="autoResize(this);updateSend()" onkeydown="handleKey(event)"></textarea>
            <button class="ubtn" onclick="document.getElementById('fileInput').click()" title="上传文件">📎</button>
            <button class="sbtn" id="sendBtn" onclick="sendMsg()">↑</button>
        </div>
    </div>
</main>
</div>

<input type="file" id="fileInput" style="display:none" accept=".pdf,.txt,.md,.docx,.xlsx,.csv" onchange="handleFileSelect(event)">

<script>
const API = '';
let S = { sid: localStorage.ragflow_sid||'', convs: {}, activeCid: null, isStreaming: false, editingCid: null };

const $ = id => document.getElementById(id);
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m, err, dur) {
    const t = document.createElement('div');
    t.className = 'toast' + (err ? ' error' : '');
    t.textContent = m;
    const id = 'toast_' + Date.now();
    t.id = id;
    document.body.appendChild(t);
    if (dur !== 0) setTimeout(() => t.remove(), dur || 3000);
    return id;
}
function toMd(t) {
    return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g,'<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g,'<em>$1</em>').replace(/\n/g,'<br>');
}

async function api(url, opts) {
    const r = await fetch(API + url, opts);
    if (!r.ok) { const e = await r.json().catch(()=>({error:'请求失败'})); throw new Error(e.error||e.detail||'请求失败'); }
    return r.json();
}

async function init() {
    if (!S.sid) { const d = await api('/api/session'); S.sid = d.session_id; localStorage.ragflow_sid = S.sid; }
    await loadState();
}

async function loadState() {
    const d = await api(`/api/state?session_id=${S.sid}`);
    const convs = {};
    (d.conversations||[]).forEach(c => convs[c.id] = { id: c.id, name: c.name, created_at: c.created_at, messages: [], files: [] });
    S.convs = convs;
    S.activeCid = d.active_conv;
    renderSidebar();
    if (S.activeCid && S.convs[S.activeCid]) {
        const cd = await api(`/api/conversations/${S.activeCid}?session_id=${S.sid}`);
        S.convs[S.activeCid].messages = cd.messages || [];
        S.convs[S.activeCid].files = cd.files || [];
    }
    refreshView();
}

function refreshView() {
    const c = S.activeCid ? S.convs[S.activeCid] : null;
    if (!c) {
        showWelcome(null);
        return;
    }
    const hasFiles = (c.files||[]).length > 0;
    if (hasFiles) { showChat(); }
    else { showWelcome(c.name); }
}

function showWelcome(name) {
    $('emptyState').classList.remove('hidden');
    $('chatInner').classList.add('hidden');
    $('inputArea').classList.add('hidden');
    $('fileBar').classList.add('hidden');
    $('fileBadge').classList.add('hidden');
    $('emptyTitle').textContent = name ? '📂 ' + name : 'RAGFlow';
    $('emptyDesc').textContent = '上传文件创建知识库，开始智能问答';
    $('topName').textContent = name || 'RAGFlow';
}

function showChat() {
    const c = S.convs[S.activeCid];
    $('emptyState').classList.add('hidden');
    $('chatInner').classList.remove('hidden');
    $('inputArea').classList.remove('hidden');
    $('topName').textContent = c.name || '对话';
    const fc = (c.files||[]).length;
    if (fc) {
        $('fileBadge').textContent = fc + ' 个文件';
        $('fileBadge').classList.remove('hidden');
        $('fileBar').classList.remove('hidden');
    }
    renderChat();
}

function renderSidebar() {
    const el = $('convList');
    const convs = Object.values(S.convs).sort((a,b) => (b.created_at||0) - (a.created_at||0));
    if (!convs.length) { el.innerHTML = '<div class="empty-hint">暂无对话<br>点击 ＋ 创建</div>'; return; }
    el.innerHTML = convs.map(c => {
        const isEdit = S.editingCid === c.id;
        const nameHtml = isEdit
            ? `<input class="cname-inp" value="${esc(c.name)}" onkeydown="saveEdit(event,'${c.id}')" onblur="saveEdit(null,'${c.id}')" onclick="event.stopPropagation()" autofocus>`
            : `<span class="cname" title="${esc(c.name)}">${esc(c.name)}</span>`;
        return `<div class="conv-item${c.id===S.activeCid?' active':''}" onclick="${isEdit?'':'switchConv(\''+c.id+'\')'}">
            ${nameHtml}
            <button class="cact" onclick="event.stopPropagation();startEdit('${c.id}')" title="重命名">✎</button>
            <button class="cact del" onclick="event.stopPropagation();confirmDelete('${c.id}','${esc(c.name)}')" title="删除">✕</button>
        </div>`;
    }).join('');
}

function renderChat() {
    const c = S.convs[S.activeCid];
    if (!c) return;
    const el = $('chatInner'); el.innerHTML = '';
    (c.messages||[]).forEach(m => {
        const d = document.createElement('div'); d.className = 'msg ' + (m.role==='user'?'user':'assistant');
        if (m.role === 'assistant') { const a = document.createElement('div'); a.className = 'avt'; a.textContent = 'AI'; d.appendChild(a); }
        const b = document.createElement('div'); b.className = 'bub';
        b.innerHTML = m.role === 'user' ? esc(m.content) : toMd(m.content) + (m.sources||'');
        d.appendChild(b); el.appendChild(d);
    });
    scrollDown();
}

function scrollDown() { const a = $('chatArea'); setTimeout(() => a.scrollTop = a.scrollHeight, 50); }

// ── Actions ──
async function createNewConv() {
    S.activeCid = null;
    showWelcome('新对话');
    renderSidebar();
}

async function switchConv(id) {
    await api(`/api/conversations/${id}/switch`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:S.sid}) });
    S.activeCid = id;
    const cd = await api(`/api/conversations/${id}?session_id=${S.sid}`);
    S.convs[id].messages = cd.messages || [];
    S.convs[id].files = cd.files || [];
    refreshView();
    renderSidebar();
}

function startEdit(id) { S.editingCid = id; renderSidebar(); }

async function saveEdit(e, id) {
    if (e && e.key !== 'Enter') return;
    const inp = document.querySelector('.cname-inp');
    const name = inp ? inp.value.trim() : '';
    S.editingCid = null;
    if (name && name !== S.convs[id]?.name) {
        await api(`/api/conversations/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:S.sid, name}) });
        S.convs[id].name = name;
    }
    renderSidebar();
    if (S.activeCid === id) $('topName').textContent = S.convs[id]?.name || '对话';
}

function confirmDelete(id, name) {
    const ov = document.createElement('div'); ov.className = 'modal-overlay';
    ov.innerHTML = `<div class="modal"><h3>删除对话</h3><p>确定要删除"${esc(name)}"及其所有文件吗？此操作不可恢复。</p>
        <div class="modal-btns"><button class="btn-cancel">取消</button><button class="btn-danger">确认删除</button></div></div>`;
    ov.onclick = e => { if (e.target === ov) ov.remove(); };
    document.body.appendChild(ov);
    const btns = ov.querySelectorAll('button');
    btns[0].onclick = () => ov.remove();
    btns[1].onclick = async () => {
        ov.remove();
        await api(`/api/conversations/${id}?session_id=${S.sid}`, { method:'DELETE' });
        const { [id]: _, ...rest } = S.convs;
        S.convs = rest;
        if (S.activeCid === id) {
            const remaining = Object.keys(S.convs);
            S.activeCid = remaining[0] || null;
        }
        renderSidebar();
        refreshView();
        toast('已删除');
    };
}

async function deleteConv(id) { await confirmDelete(id, S.convs[id]?.name||'对话'); }

function toggleSidebar() { $('sidebar').classList.toggle('collapsed'); }

async function handleFileSelect(e) {
    const file = e.target.files[0];
    if (!file) return;
    await uploadFile(file);
    e.target.value = '';
}

async function uploadFile(file) {
    if (S.isStreaming || !file) return;
    console.log('uploadFile: activeCid =', S.activeCid);
    const form = new FormData();
    form.append('file', file);
    form.append('session_id', S.sid);
    if (S.activeCid) { form.append('conv_id', S.activeCid); console.log('conv_id appended:', S.activeCid); }
    else { console.log('NO activeCid, will create new conversation'); }

    const tid = toast('⏳ 文件解析中，请稍候...', false, 0);
    const timer = setTimeout(() => { const t = document.getElementById(tid); if (t) t.textContent = '⏳ 仍在解析中...'; }, 8000);

    try {
        const d = await api('/api/upload', { method:'POST', body:form });
        clearTimeout(timer);
        document.getElementById(tid)?.remove();

        const cid = d.conv_id;
        S.convs[cid] = {
            id: cid, name: d.conv_name, created_at: Date.now()/1000,
            messages: d.messages || [], files: d.files || []
        };
        S.activeCid = cid;
        renderSidebar();
        refreshView();
        toast(`✅ 已添加 "${d.file_name}"`);
    } catch(e) {
        clearTimeout(timer);
        document.getElementById(tid)?.remove();
        toast(e.message || '上传失败', true);
    }
}

function toggleFileList() {
    const c = S.convs[S.activeCid];
    if (!c?.files?.length) return;
    const el = $('fileList');
    if (el.classList.contains('hidden')) {
        el.innerHTML = c.files.map(f => `<div class="fl-item">${esc(f.file_name)}</div>`).join('');
        el.classList.remove('hidden');
    } else {
        el.classList.add('hidden');
    }
}

// ── Chat ──
function updateSend() {
    const has = $('msgInput').value.trim();
    $('sendBtn').classList.toggle('ok', !!has);
    $('sendBtn').disabled = !has;
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 180) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }

async function sendMsg() {
    const inp = $('msgInput'); const text = inp.value.trim();
    if (!text || S.isStreaming) return;
    const c = S.convs[S.activeCid];
    if (!c?.files?.length) return toast('请先上传文件', true);

    S.isStreaming = true;
    c.messages.push({role:'user', content:text});
    inp.value = ''; updateSend(); autoResize(inp); renderChat();
    const aib = appendStreamMsg();

    try {
        const r = await fetch(API+'/api/chat',{
            method:'POST',headers:{'Content-Type':'application/json'},
            body:JSON.stringify({question:text, session_id:S.sid, conv_id:S.activeCid})
        });
        if (!r.ok) { const e = await r.json(); aib.innerHTML = '❌ '+esc(e.error||'失败'); S.isStreaming = false; return; }

        let full='', src='';
        const reader = r.body.getReader(); const dec = new TextDecoder(); let buf='';
        while(true) {
            const {done,value} = await reader.read(); if (done) break;
            buf += dec.decode(value,{stream:true});
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try { const d = JSON.parse(line.slice(6));
                    if (d.type==='sources'&&d.sources) src = '<div class="src-box"><div class="src-title">📖 引用来源</div>'+d.sources.map(s=>`<div class="src-item">${esc(s)}</div>`).join('')+'</div>';
                    else if (d.type==='token') { full += d.content; aib.innerHTML = toMd(full) + src; scrollDown(); }
                } catch(e) {}
            }
        }
        c.messages.push({role:'assistant', content:full, sources:src});
    } catch(e) { aib.innerHTML = '❌ '+esc(e.message); }
    S.isStreaming = false;
}

function appendStreamMsg() {
    const el = $('chatInner');
    const d = document.createElement('div'); d.className = 'msg assistant';
    d.innerHTML = '<div class="avt">AI</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>';
    el.appendChild(d); scrollDown();
    return d.querySelector('.bub');
}

document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer?.files?.[0]; if (f) uploadFile(f); });
document.addEventListener('paste', e => {
    for (const item of e.clipboardData?.items||[]) {
        if (item.kind === 'file') { e.preventDefault(); uploadFile(item.getAsFile()); return; }
    }
});

init();
</script>
</body>
</html>
