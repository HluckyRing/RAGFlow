<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGFlow</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
    --brand: #4D6BFE;
    --sidebar-bg: #1E2130;
    --sidebar-text: #9CA3AF;
    --sidebar-active: #EEF2FF;
    --main-bg: #FFFFFF;
    --input-bg: #F9FAFB;
    --bubble-user: #4D6BFE;
    --bubble-ai: #F9FAFB;
    --text-primary: #1F2937;
    --text-secondary: #6B7280;
    --border: #E5E7EB;
    --shadow: 0 4px 12px rgba(0,0,0,0.04);
    --radius: 12px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #D1D5DB; border-radius: 3px; }

/* ── Sidebar ── */
.sidebar { width: 260px; min-width: 260px; background: var(--sidebar-bg); display: flex; flex-direction: column; height: 100vh; }
.sidebar-logo { padding: 16px 20px; height: 64px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
.sidebar-logo .icon { width: 32px; height: 32px; background: var(--brand); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 700; font-size: 16px; }
.sidebar-logo span { color: #fff; font-size: 18px; font-weight: 700; }
.sidebar-new { padding: 12px 16px; }
.sidebar-new button { width: 100%; height: 40px; border-radius: 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); color: #D1D5DB; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 0 14px; transition: all .2s; }
.sidebar-new button:hover { background: rgba(255,255,255,0.1); color: #fff; }
.kb-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
.kb-item { padding: 8px 12px; border-radius: 8px; cursor: pointer; color: #9CA3AF; font-size: 13px; margin-bottom: 2px; transition: all .2s; }
.kb-item-inner { display: flex; align-items: center; gap: 4px; }
.kb-item:hover { background: rgba(255,255,255,0.06); color: #D1D5DB; }
.kb-item.active { background: rgba(77,107,254,0.12); color: #fff; border-left: 3px solid var(--brand); padding-left: 9px; }
.kb-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.kb-item .name-input { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid var(--brand); border-radius: 4px; color: #fff; font-size: 13px; padding: 2px 6px; outline: none; }
.kb-item .meta { font-size: 10px; color: #6B7280; }
.kb-item .act { opacity: 0; width: 22px; height: 22px; border-radius: 4px; border: none; background: transparent; color: #9CA3AF; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; transition: all .2s; flex-shrink: 0; }
.kb-item:hover .act { opacity: 1; }
.kb-item .act:hover { background: rgba(255,255,255,0.1); color: #fff; }
.kb-item .act.del:hover { background: rgba(239,68,68,0.2); color: #EF4444; }
.kb-empty { color: #6B7280; font-size: 12px; text-align: center; padding: 24px 8px; }

/* ── Modal ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 999; display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 14px; padding: 28px 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
.modal h3 { font-size: 18px; margin-bottom: 16px; color: var(--text-primary); }
.modal input { width: 100%; height: 40px; border: 1px solid var(--border); border-radius: 8px; padding: 0 12px; font-size: 14px; outline: none; }
.modal input:focus { border-color: var(--brand); }
.modal .btns { display: flex; gap: 8px; margin-top: 16px; justify-content: flex-end; }
.modal .btns button { height: 36px; padding: 0 20px; border-radius: 8px; border: none; font-size: 14px; cursor: pointer; }
.modal .btn-cancel { background: #F3F4F6; color: var(--text-secondary); }
.modal .btn-ok { background: var(--brand); color: #fff; }

/* ── Main ── */
.main { flex: 1; display: flex; flex-direction: column; background: var(--main-bg); height: 100vh; }
.topbar { height: 60px; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: var(--text-primary); }

/* ── Sidebar Toggle ── */
.sidebar-toggle { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; transition: all .2s; margin-right: 4px; }
.sidebar-toggle:hover { background: #F3F4F6; }
.sidebar.hidden { display: none; }

/* ── Chat ── */
.chat-area { flex: 1; overflow-y: auto; padding: 24px 0; }
.chat-inner { max-width: 800px; margin: 0 auto; padding: 0 24px; }
.msg { display: flex; gap: 12px; margin-bottom: 24px; }
.msg.user { justify-content: flex-end; }
.msg.user .bubble { background: var(--bubble-user); color: #fff; border-radius: 14px 14px 4px 14px; max-width: 80%; padding: 10px 16px; font-size: 14px; line-height: 1.6; }
.msg.assistant { align-items: flex-start; }
.msg.assistant .avatar { width: 36px; height: 36px; border-radius: 50%; background: #EEF2FF; display: flex; align-items: center; justify-content: center; color: var(--brand); font-weight: 700; font-size: 14px; flex-shrink: 0; }
.msg.assistant .bubble { background: var(--bubble-ai); border-radius: 14px 14px 14px 4px; max-width: 85%; padding: 12px 16px; font-size: 14px; line-height: 1.7; color: var(--text-primary); }
.msg .bubble p { margin: 4px 0; }
.msg .bubble pre { background: #1E293B; border-radius: 8px; padding: 12px 16px; overflow-x: auto; margin: 8px 0; }
.msg .bubble code { font-family: "SF Mono","Fira Code",monospace; font-size: 13px; color: #E2E8F0; }
.msg .bubble p code { background: rgba(0,0,0,0.06); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
.msg.user .bubble p code { background: rgba(255,255,255,0.2); }
.msg .bubble table { border-collapse: collapse; margin: 8px 0; width: 100%; }
.msg .bubble th, .msg .bubble td { border: 1px solid #E5E7EB; padding: 6px 12px; font-size: 13px; text-align: left; }
.msg .bubble th { background: #F9FAFB; font-weight: 600; }

.typing { display: flex; gap: 4px; padding: 12px 16px; }
.typing span { width: 8px; height: 8px; border-radius: 50%; background: #9CA3AF; animation: bounce 1.4s infinite ease-in-out both; }
.typing span:nth-child(1) { animation-delay: -.32s; }
.typing span:nth-child(2) { animation-delay: -.16s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); gap: 16px; }
.empty-state h2 { font-size: 24px; color: var(--text-primary); }
.empty-state p { font-size: 14px; }
.empty-state .drop-zone { border: 2px dashed var(--border); border-radius: 16px; padding: 48px 64px; text-align: center; cursor: pointer; transition: all .3s; background: var(--input-bg); }
.empty-state .drop-zone:hover { border-color: var(--brand); background: #EEF2FF; }
.empty-state .drop-zone p { font-size: 15px; color: var(--text-primary); }
.empty-state .drop-zone .sub { color: var(--text-secondary); font-size: 12px; margin-top: 6px; }

/* ── Input ── */
.input-area { padding: 16px 24px 24px; flex-shrink: 0; }
.input-inner { max-width: 800px; margin: 0 auto; position: relative; }
.input-box { width: 100%; min-height: 56px; max-height: 200px; border: 1px solid var(--border); border-radius: 16px; background: var(--input-bg); padding: 14px 48px 14px 16px; font-size: 14px; font-family: inherit; resize: none; outline: none; line-height: 1.5; transition: border-color .2s, box-shadow .2s; }
.input-box:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(77,107,254,0.1); }
.input-box::placeholder { color: #9CA3AF; }
.input-tools { position: absolute; left: 12px; bottom: 14px; display: flex; gap: 6px; }
.input-tools button { width: 32px; height: 32px; border-radius: 8px; border: none; background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all .2s; }
.input-tools button:hover { background: #E5E7EB; color: var(--text-primary); }
.send-btn { position: absolute; right: 8px; bottom: 8px; width: 40px; height: 40px; border-radius: 50%; border: none; background: #D1D5DB; color: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all .2s; }
.send-btn.active { background: var(--brand); }
.send-btn.active:hover { transform: scale(1.05); }
.hidden-file { display: none; }

.source-box { margin-top: 8px; padding: 10px 14px; background: #F9FAFB; border-radius: 10px; font-size: 12px; color: var(--text-secondary); border: 1px solid var(--border); }
.source-box .src-title { font-weight: 600; color: var(--text-primary); margin-bottom: 6px; }
.source-box .src-item { padding: 4px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.source-box .src-item:last-child { border: none; }

/* ── Toast ── */
.toast { position: fixed; top: 20px; right: 20px; background: #1F2937; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 13px; z-index: 9999; animation: slideIn .3s ease; }
.toast.error { background: #EF4444; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@media (max-width: 768px) {
    .sidebar { display: none; }
    .chat-inner, .input-inner { padding: 0 12px; }
    .msg .bubble { max-width: 90% !important; }
}
</style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-logo">
        <div class="icon">R</div>
        <span>RAGFlow</span>
    </div>
    <div class="sidebar-new">
        <button onclick="showCreateDialog()">＋ 新建知识库</button>
    </div>
    <div class="kb-list" id="kbList">
        <div class="kb-empty">暂无知识库<br>上传文件开始使用</div>
    </div>
</aside>

<main class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()" title="隐藏/显示侧边栏">☰</button>
            <span id="topbarModel">📄 未选择知识库</span>
        </div>
    </header>

    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h2 id="emptyTitle">有什么可以帮助你的？</h2>
            <p id="emptyDesc">上传 PDF / Word / Excel / TXT / Markdown，开始智能问答</p>
            <div class="drop-zone" onclick="document.getElementById('fileInput').click()">
                <p>📂 点击上传文件创建知识库</p>
                <p class="sub">支持 PDF, DOCX, XLSX, CSV, TXT, MD</p>
            </div>
        </div>
        <div class="chat-inner" id="chatInner" style="display:none;"></div>
    </div>

    <div class="input-area" id="inputArea" style="display:none;">
        <div class="input-inner">
            <div class="input-tools">
                <button onclick="document.getElementById('fileInput').click()" title="上传新文件">📎</button>
            </div>
            <textarea class="input-box" id="msgInput" placeholder="给 RAGFlow 发送消息..." rows="1" oninput="autoResize(this); updateSendBtn()" onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>↑</button>
        </div>
    </div>
</main>

<input type="file" class="hidden-file" id="fileInput" accept=".pdf,.txt,.md,.docx,.xlsx,.csv" onchange="uploadFile(this.files[0], activeKb)">

<script>
const API = '';
let sessionId = localStorage.getItem('ragflow_sid') || '';
let kbs = {};
let activeKb = null;
let messages = [];
let isStreaming = false;

async function init() {
    if (!sessionId) {
        const r = await fetch(API + '/api/session');
        const d = await r.json();
        sessionId = d.session_id;
        localStorage.setItem('ragflow_sid', sessionId);
    }
    await refreshKBs();
}
init();

async function refreshKBs() {
    const r = await fetch(API + `/api/kbs?session_id=${sessionId}`);
    const d = await r.json();
    kbs = d.kbs || [];
    renderKBs();
    const a = kbs.find(k => k.active);
    if (a && a.name !== activeKb) {
        activeKb = a.name;
        await loadHistory();
    }
    if (!activeKb && kbs.length === 0) { showEmpty(); return; }
    const kb = kbs.find(k => k.name === activeKb);
    if (!kb || kb.chars === 0) { showUploadPage(); }
    else { showChat(); }
}
function renderKBs() {
    const el = document.getElementById('kbList');
    if (kbs.length === 0) {
        el.innerHTML = '<div class="kb-empty">暂无知识库<br>点击 ＋ 创建</div>';
        return;
    }
    el.innerHTML = kbs.map(k => {
        const label = k.editing
            ? `<input class="name-input" value="${esc(k.name)}" onkeydown="renameKb(event,'${esc(k.name)}')" onblur="cancelEdit('${esc(k.name)}')" onclick="event.stopPropagation()" autofocus>`
            : `<span class="name">${esc(k.name)}</span>`;
        return `<div class="kb-item ${k.active?'active':''}" onclick="${k.editing?'':'switchKb(\''+esc(k.name)+'\')'}">
            <div class="kb-item-inner">${label}
            <span style="flex-shrink:0;display:flex;gap:0;">
            <button class="act" onclick="event.stopPropagation();startEdit('${esc(k.name)}')" title="重命名">✎</button>
            <button class="act del" onclick="event.stopPropagation();deleteKb('${esc(k.name)}')">✕</button>
            </span></div>
            <div class="meta">${k.file_count} 个文件 · ${Math.round(k.chars/1000)||'<1'}k 字</div>
            ${k.files&&k.files.length?`<div class="meta">${k.files.map(f=>esc(f)).join(', ')}</div>`:''}
        </div>`;
    }).join('');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

function showCreateDialog() {
    const d = document.createElement('div');
    d.className = 'modal-overlay';
    d.innerHTML = `<div class="modal"><h3>新建知识库</h3>
        <input id="newKbName" placeholder="输入知识库名称..." onkeydown="if(event.key==='Enter')createEmptyKb()" autofocus>
        <p style="font-size:12px;color:#9CA3AF;margin-top:6px;">创建后可上传多个文件</p>
        <div class="btns"><button class="btn-cancel" onclick="this.closest('.modal-overlay').remove()">取消</button>
        <button class="btn-ok" onclick="createEmptyKb()">创建</button></div></div>`;
    d.onclick = e => { if (e.target === d) d.remove(); };
    document.body.appendChild(d);
    setTimeout(()=>document.getElementById('newKbName').focus(), 100);
}
async function createEmptyKb() {
    const inp = document.getElementById('newKbName');
    const name = inp.value.trim();
    if (!name) return toast('名称不能为空', true);
    const r = await fetch(API + '/api/kb-create', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({session_id:sessionId, name})
    });
    if (!r.ok) { const e = await r.json(); return toast(e.error, true); }
    document.querySelector('.modal-overlay')?.remove();
    await refreshKBs();
    toast(`✅ 已创建 "${name}"（可上传文件）`);
}
function startEdit(name) {
    kbs.find(k => k.name === name).editing = true;
    renderKBs();
}
async function renameKb(e, oldName) {
    if (e.key !== 'Enter') return;
    const newName = e.target.value.trim();
    if (!newName || newName === oldName) { cancelEdit(oldName); return; }
    const r = await fetch(API + `/api/kbs/${encodeURIComponent(oldName)}`, {
        method: 'PUT', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({session_id:sessionId, new_name:newName})
    });
    if (!r.ok) { const err = await r.json(); toast(err.error, true); return; }
    await refreshKBs();
}
function cancelEdit(name) {
    const kb = kbs.find(k => k.name === name);
    if (kb) { kb.editing = false; renderKBs(); }
}

async function uploadFile(file, kbName) {
    if (!file) return;
    const form = new FormData();
    form.append('file', file);
    form.append('session_id', sessionId);
    if (kbName) form.append('kb_name', kbName);
    try {
        const r = await fetch(API + '/api/kbs', { method: 'POST', body: form });
        if (!r.ok) { const e = await r.json(); return toast(e.error, true); }
        const d = await r.json();
        if (d.session_id !== sessionId) { sessionId = d.session_id; localStorage.setItem('ragflow_sid', sessionId); }
        await refreshKBs();
        toast(`${d.is_new?'✅ 创建':'📎 追加到'} "${d.name}"，${d.chars} 字符`);
    } catch (e) { toast('上传失败: ' + e.message, true); }
    document.getElementById('fileInput').value = '';
}
async function switchKb(name) {
    await fetch(API + '/api/kb-switch', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, kb_name: name })
    });
    await refreshKBs();
    await loadHistory();
    showChat();
}
async function deleteKb(name) {
    await fetch(API + `/api/kbs/${encodeURIComponent(name)}?session_id=${sessionId}`, { method: 'DELETE' });
    if (activeKb === name) { activeKb = null; messages = []; }
    await refreshKBs();
    if (!activeKb) showEmpty();
}
async function loadHistory() {
    const r = await fetch(API + `/api/history?session_id=${sessionId}`);
    const d = await r.json();
    messages = d.messages || [];
    renderMessages();
}
function renderMessages() {
    const el = document.getElementById('chatInner');
    el.innerHTML = messages.map(m => {
        if (m.role === 'user') return `<div class="msg user"><div class="bubble">${esc(m.content)}</div></div>`;
        return `<div class="msg assistant"><div class="avatar">AI</div><div class="bubble">${marked.parse(m.content)}</div></div>`;
    }).join('');
    scrollDown();
}
function showChat() {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('chatInner').style.display = 'block';
    document.getElementById('inputArea').style.display = 'block';
    document.getElementById('topbarModel').innerHTML = '📄 ' + esc(activeKb || '');
    renderMessages();
}
function showEmpty() {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('chatInner').style.display = 'none';
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('topbarModel').innerHTML = '📄 未选择知识库';
    document.getElementById('emptyTitle').textContent = '有什么可以帮助你的？';
    document.getElementById('emptyDesc').textContent = '上传 PDF / Word / Excel / TXT / Markdown，开始智能问答';
}
function showUploadPage() {
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('chatInner').style.display = 'none';
    document.getElementById('inputArea').style.display = 'none';
    document.getElementById('topbarModel').innerHTML = '📄 ' + esc(activeKb || '');
    document.getElementById('emptyTitle').textContent = '📂 ' + esc(activeKb || '');
    document.getElementById('emptyDesc').textContent = '此知识库还没有文件，上传文件开始使用';
}
function addMsg(role, content) {
    const el = document.getElementById('chatInner');
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    if (role === 'user') {
        div.innerHTML = `<div class="bubble">${esc(content)}</div>`;
    } else {
        div.innerHTML = `<div class="avatar">AI</div><div class="bubble" id="streamBubble"></div>`;
    }
    el.appendChild(div);
    scrollDown();
    return role === 'assistant' ? div.querySelector('.bubble') : null;
}
function scrollDown() {
    const area = document.getElementById('chatArea');
    setTimeout(() => area.scrollTop = area.scrollHeight, 50);
}

async function sendMessage() {
    if (isStreaming) return;
    const inp = document.getElementById('msgInput');
    const q = inp.value.trim();
    if (!q) return;
    if (!activeKb) return toast('请先上传文件', true);

    addMsg('user', q);
    messages.push({ role: 'user', content: q });
    inp.value = '';
    updateSendBtn();
    autoResize(inp);

    const bubble = addMsg('assistant', '');
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    isStreaming = true;

    try {
        const r = await fetch(API + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q, session_id: sessionId })
        });
        if (!r.ok) {
            const e = await r.json();
            bubble.innerHTML = '❌ ' + esc(e.error || '请求失败');
            isStreaming = false;
            return;
        }

        let fullText = '';
        let sourcesHtml = '';
        const reader = r.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const d = JSON.parse(line.slice(6));
                    if (d.type === 'sources' && d.sources) {
                        sourcesHtml = '<div class="source-box"><div class="src-title">📖 引用来源</div>' +
                            d.sources.map(s => `<div class="src-item">${esc(s)}</div>`).join('') + '</div>';
                    } else if (d.type === 'token') {
                        fullText += d.content;
                        bubble.innerHTML = marked.parse(fullText) + sourcesHtml;
                        scrollDown();
                    } else if (d.type === 'done') {
                        messages.push({ role: 'assistant', content: fullText });
                    }
                } catch (e) {}
            }
        }
    } catch (e) {
        bubble.innerHTML = '❌ 请求失败: ' + esc(e.message);
    }
    isStreaming = false;
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
function updateSendBtn() {
    const btn = document.getElementById('sendBtn');
    const has = document.getElementById('msgInput').value.trim().length > 0;
    btn.disabled = !has;
    btn.classList.toggle('active', has);
}
function toggleSidebar() {
    document.querySelector('.sidebar').classList.toggle('hidden');
}
function toast(msg, isErr) {
    const t = document.createElement('div');
    t.className = 'toast' + (isErr ? ' error' : '');
    t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => { t.remove(); }, 3000);
}

document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    if (items) {
        for (const item of items) {
            if (item.kind === 'file') {
                e.preventDefault();
                uploadFile(item.getAsFile(), activeKb);
                return;
            }
        }
    }
});
document.addEventListener('dragover', e => { e.preventDefault(); });
document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer?.files?.[0];
    if (file) uploadFile(file, activeKb);
});
</script>
</body>
</html>
