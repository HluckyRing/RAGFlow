<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAGFlow</title>
<style>
:root {
    --brand: #4D6BFE; --sidebar-bg: #1E2130; --main-bg: #FFFFFF;
    --input-bg: #F9FAFB; --bubble-user: #4D6BFE; --bubble-ai: #F9FAFB;
    --text-primary: #1F2937; --text-secondary: #6B7280; --border: #E5E7EB;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;color:var(--text-primary);height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}

.app{display:flex;height:100vh}
.sidebar{width:260px;min-width:260px;background:var(--sidebar-bg);display:flex;flex-direction:column;height:100vh;transition:width .2s,min-width .2s;overflow:hidden}
.sidebar.collapsed{width:0;min-width:0}
.sidebar-logo{padding:16px 20px;height:64px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);flex-shrink:0}
.sidebar-logo .icon{width:32px;height:32px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px}
.sidebar-logo span{color:#fff;font-size:18px;font-weight:700}
.sidebar-new{padding:12px 16px;flex-shrink:0}
.sidebar-new button{width:100%;height:40px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);color:#D1D5DB;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .2s}
.sidebar-new button:hover{background:rgba(255,255,255,.1);color:#fff}
.conv-list{flex:1;overflow-y:auto;padding:4px 12px}
.conv-item{padding:8px 12px;border-radius:8px;cursor:pointer;color:#9CA3AF;font-size:13px;margin-bottom:2px;transition:all .2s;display:flex;align-items:center;gap:4px}
.conv-item:hover{background:rgba(255,255,255,.06);color:#D1D5DB}
.conv-item.active{background:rgba(77,107,254,.12);color:#fff;border-left:3px solid var(--brand);padding-left:9px}
.conv-item .cname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.conv-item .cdel{width:22px;height:22px;border-radius:4px;border:none;background:transparent;color:transparent;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.conv-item:hover .cdel{color:#9CA3AF}
.conv-item .cdel:hover{background:rgba(239,68,68,.15);color:#EF4444}
.empty-hint{color:#6B7280;font-size:12px;text-align:center;padding:24px 8px}

.main{flex:1;display:flex;flex-direction:column;background:var(--main-bg);height:100vh;min-width:0}
.topbar{height:52px;padding:0 20px;display:flex;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0;gap:8px}
.topbar .tbtn{width:32px;height:32px;border-radius:6px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.topbar .tbtn:hover{background:#F3F4F6}
.topbar .kb-tag{font-size:12px;padding:3px 10px;border-radius:10px;background:#EEF2FF;color:var(--brand);font-weight:500}
.topbar .no-kb{font-size:13px;color:var(--text-secondary)}

.chat-area{flex:1;overflow-y:auto;padding:20px 0}
.chat-inner{max-width:800px;margin:0 auto;padding:0 24px}
.msg{display:flex;gap:10px;margin-bottom:20px}
.msg.user{justify-content:flex-end}
.msg.user .bub{background:var(--bubble-user);color:#fff;border-radius:14px 14px 4px 14px;max-width:80%;padding:10px 16px;font-size:14px;line-height:1.6}
.msg.assistant{align-items:flex-start}
.msg.assistant .avt{width:34px;height:34px;border-radius:50%;background:#EEF2FF;display:flex;align-items:center;justify-content:center;color:var(--brand);font-weight:700;font-size:13px;flex-shrink:0}
.msg.assistant .bub{background:var(--bubble-ai);border-radius:14px 14px 14px 4px;max-width:85%;padding:12px 16px;font-size:14px;line-height:1.7;color:var(--text-primary)}
.msg .bub p{margin:4px 0}
.msg .bub pre{background:#1E293B;border-radius:8px;padding:12px 16px;overflow-x:auto;margin:8px 0}
.msg .bub code{font-family:"SF Mono","Fira Code",monospace;font-size:13px;color:#E2E8F0}
.msg .bub p code{background:rgba(0,0,0,.06);padding:2px 6px;border-radius:4px;font-size:13px}
.msg.user .bub p code{background:rgba(255,255,255,.2)}

.typing{display:flex;gap:4px;padding:12px 16px}
.typing span{width:8px;height:8px;border-radius:50%;background:#9CA3AF;animation:bounce 1.4s infinite ease-in-out both}
.typing span:nth-child(1){animation-delay:-.32s}
.typing span:nth-child(2){animation-delay:-.16s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);gap:16px}
.empty-state h2{font-size:22px;color:var(--text-primary)}
.empty-state .drop-zone{border:2px dashed var(--border);border-radius:16px;padding:40px 56px;text-align:center;cursor:pointer;transition:all .3s;background:var(--input-bg)}
.empty-state .drop-zone:hover{border-color:var(--brand);background:#EEF2FF}
.empty-state .drop-zone p{font-size:14px;color:var(--text-primary)}
.empty-state .drop-zone .sub{color:var(--text-secondary);font-size:12px;margin-top:6px}

.src-box{margin-top:8px;padding:10px 14px;background:#F9FAFB;border-radius:10px;font-size:12px;color:var(--text-secondary);border:1px solid var(--border)}
.src-box .src-title{font-weight:600;color:var(--text-primary);margin-bottom:6px}
.src-box .src-item{padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.src-box .src-item:last-child{border:none}

.input-area{padding:12px 24px 20px;flex-shrink:0}
.input-row{max-width:800px;margin:0 auto;display:flex;align-items:flex-end;gap:8px;background:var(--input-bg);border:1px solid var(--border);border-radius:16px;padding:6px;transition:border-color .2s}
.input-row:focus-within{border-color:var(--brand);box-shadow:0 0 0 3px rgba(77,107,254,.1)}
.input-row textarea{flex:1;border:none;outline:none;resize:none;background:transparent;font-size:14px;font-family:inherit;line-height:1.5;min-height:28px;max-height:180px;padding:6px 4px}
.input-row textarea::placeholder{color:#9CA3AF}
.input-row .ubtn{width:36px;height:36px;border:none;border-radius:10px;background:transparent;color:var(--text-secondary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.input-row .ubtn:hover{background:#E5E7EB}
.input-row .sbtn{width:36px;height:36px;border:none;border-radius:50%;background:#D1D5DB;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s}
.input-row .sbtn.ok{background:var(--brand)}
.input-row .sbtn.ok:hover{transform:scale(1.05)}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:999;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:14px;padding:28px 32px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal h3{font-size:18px;margin-bottom:12px}
.modal p{font-size:12px;color:#9CA3AF;margin-bottom:12px}
.modal-row{display:flex;gap:8px;margin-bottom:12px}
.modal-row input,.modal-row select{flex:1;height:38px;border:1px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;outline:none;background:#fff}
.modal-row input:focus,.modal-row select:focus{border-color:var(--brand)}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.modal-btns button{height:36px;padding:0 20px;border-radius:8px;border:none;font-size:14px;cursor:pointer}
.btn-cancel{background:#F3F4F6;color:var(--text-secondary)}
.btn-ok{background:var(--brand);color:#fff}

.toast{position:fixed;top:20px;right:20px;background:#1F2937;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:9999;animation:slideIn .3s ease}
.toast.error{background:#EF4444}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo"><div class="icon">R</div><span>RAGFlow</span></div>
        <div class="sidebar-new"><button onclick="createNewConv()">＋ 新对话</button></div>
    <div class="conv-list" id="convList"><div class="empty-hint">暂无对话</div></div>
</aside>
<main class="main">
    <header class="topbar">
        <button class="tbtn" onclick="toggleSidebar()">☰</button>
        <span id="topbarInfo" class="no-kb">未绑定知识库</span>
    </header>
    <div class="chat-area" id="chatArea">
        <div class="empty-state" id="emptyState">
            <h2 id="emptyTitle">RAGFlow</h2>
            <p id="emptyDesc">上传文件创建知识库，开始智能问答</p>
            <div class="drop-zone" onclick="triggerUpload()">
                <p>📂 点击或拖拽上传文件</p>
                <p class="sub">支持 PDF, DOCX, XLSX, CSV, TXT, MD</p>
            </div>
            <button onclick="createNewConv()" style="padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-size:14px">＋ 新建空白对话</button>
        </div>
        <div class="chat-inner hidden" id="chatInner"></div>
    </div>
    <div class="input-area hidden" id="inputArea">
        <div class="input-row">
            <textarea id="msgInput" placeholder="给 RAGFlow 发送消息..." rows="1"
                oninput="autoResize(this);updateSend()" onkeydown="handleKey(event)"></textarea>
            <button class="ubtn" onclick="triggerUpload()" title="上传文件">📎</button>
            <button class="sbtn" id="sendBtn" onclick="sendMsg()">↑</button>
        </div>
    </div>
</main>
</div>
<input type="file" id="fileInput" style="display:none" accept=".pdf,.txt,.md,.docx,.xlsx,.csv">

<script>
const API = '';
let S = { sid: localStorage.ragflow_sid||'', convs: {}, activeCid: null, kbs: [], isStreaming: false };

const $ = id => document.getElementById(id);
const E = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html) e.innerHTML = html; return e; };

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m, err) { const t = document.createElement('div'); t.className = 'toast'+(err?' error':''); t.textContent = m; document.body.appendChild(t); setTimeout(() => t.remove(), 3000); }
function toMarkdown(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/\n/g, '<br>');
}

// ── API ──
async function api(url, opts) {
    const r = await fetch(API + url, opts);
    if (!r.ok) { const e = await r.json().catch(()=>({error:'请求失败'})); throw new Error(e.error||e.detail||'请求失败'); }
    return r.json();
}

async function init() {
    if (!S.sid) { const d = await api('/api/session'); S.sid = d.session_id; localStorage.ragflow_sid = S.sid; }
    await loadState();
}
async function loadState() {
    const d = await api(`/api/state?session_id=${S.sid}`);
    S.convs = {}; (d.conversations||[]).forEach(c => S.convs[c.id] = {...c, messages:[]});
    S.activeCid = d.active_conv || (d.conversations?.[0]?.id) || null;
    S.kbs = d.kbs || [];
    render();
    if (S.activeCid && S.convs[S.activeCid]) {
        const md = await api(`/api/conversations/${S.activeCid}/messages?session_id=${S.sid}`);
        S.convs[S.activeCid].messages = md.messages || [];
        renderChat();
    }
}

// ── Render ──
function render() {
    renderSidebar();
    renderTopbar();
    if (!S.activeCid) { showEmpty(); return; }
    const c = S.convs[S.activeCid];
    if (!c || !c.kb_name) { showUploadPage(c?.name||'新对话'); return; }
    $('emptyState').classList.add('hidden');
    $('chatInner').classList.remove('hidden');
    $('inputArea').classList.remove('hidden');
    renderChat();
}

function renderSidebar() {
    const el = $('convList');
    const convs = Object.values(S.convs).sort((a,b)=>(b.created_at||0)-(a.created_at||0));
    if (!convs.length) { el.innerHTML = '<div class="empty-hint">暂无对话<br>点击 ＋ 创建</div>'; return; }
    el.innerHTML = convs.map(c => `
        <div class="conv-item${c.id===S.activeCid?' active':''}" onclick="switchConv('${c.id}')">
            <span class="cname" title="${esc(c.name)}">${c.kb_name?'📄 ':''}${esc(c.name)}</span>
            <button class="cdel" onclick="event.stopPropagation();deleteConv('${c.id}')">✕</button>
        </div>`).join('');
}

function renderTopbar() {
    const c = S.activeCid ? S.convs[S.activeCid] : null;
    $('topbarInfo').innerHTML = c?.kb_name
        ? `<span class="kb-tag">📄 ${esc(c.kb_name)}</span>`
        : '<span class="no-kb">未绑定知识库 — 上传文件开始</span>';
}

function showEmpty() {
    $('emptyState').classList.remove('hidden');
    $('chatInner').classList.add('hidden');
    $('inputArea').classList.add('hidden');
    $('emptyTitle').textContent = 'RAGFlow';
    $('emptyDesc').textContent = '上传文件创建知识库，开始智能问答';
    $('topbarInfo').innerHTML = '<span class="no-kb">未选择对话</span>';
}

function showUploadPage(name) {
    $('emptyState').classList.remove('hidden');
    $('chatInner').classList.add('hidden');
    $('inputArea').classList.add('hidden');
    $('emptyTitle').textContent = '📂 ' + (name||'');
    $('emptyDesc').textContent = '此对话还没有知识库，上传文件开始';
    $('topbarInfo').innerHTML = '<span class="no-kb">未绑定知识库</span>';
}

function renderChat() {
    const c = S.convs[S.activeCid];
    if (!c) return;
    const msgs = c.messages || [];
    const el = $('chatInner');
    el.innerHTML = '';
    if (!msgs.length && !c.kb_name) return;
    msgs.forEach(m => {
        const d = E('div', 'msg ' + (m.role === 'user' ? 'user' : 'assistant'));
        if (m.role === 'assistant') d.appendChild(E('div', 'avt', 'AI'));
        const b = E('div', 'bub');
        b.innerHTML = m.role === 'user' ? esc(m.content) : toMarkdown(m.content) + (m.sources||'');
        d.appendChild(b);
        el.appendChild(d);
    });
    scrollDown();
}

function scrollDown() {
    const a = $('chatArea');
    setTimeout(() => a.scrollTop = a.scrollHeight, 50);
}

// ── Actions ──
async function switchConv(id) {
    await api(`/api/conversations/${id}/switch`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:S.sid}) });
    S.activeCid = id;
    const md = await api(`/api/conversations/${id}/messages?session_id=${S.sid}`);
    S.convs[id].messages = md.messages || [];
    render();
}

async function deleteConv(id) {
    await api(`/api/conversations/${id}?session_id=${S.sid}`, { method:'DELETE' });
    await loadState();
}

function toggleSidebar() { $('sidebar').classList.toggle('collapsed'); }

async function triggerUpload() {
    const inp = $('fileInput');
    inp.onchange = async () => { if (inp.files[0]) await uploadFile(inp.files[0]); inp.value = ''; };
    inp.click();
}

async function createNewConv() {
    await api('/api/conversations', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({session_id:S.sid, name:'新对话', kb_name:''}) });
    await loadState();
}

function showCreateDialog() {} // unused, kept for compatibility

async function uploadFile(file) {
    const form = new FormData();
    form.append('file', file);
    form.append('session_id', S.sid);
    const c = S.activeCid ? S.convs[S.activeCid] : null;
    if (c?.kb_name) form.append('kb_name', c.kb_name);
    try {
        const d = await api('/api/upload', { method:'POST', body:form });
        if (d.session_id !== S.sid) { S.sid = d.session_id; localStorage.ragflow_sid = S.sid; }
        if (!S.activeCid) {
            await api('/api/conversations', { method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({session_id:S.sid, name:d.kb_name, kb_name:d.kb_name}) });
        } else if (!c.kb_name) {
            await api(`/api/conversations/${S.activeCid}/bind-kb`, { method:'POST', headers:{'Content-Type':'application/json'},
                body:JSON.stringify({session_id:S.sid, kb_name:d.kb_name}) });
        }
        await loadState();
        toast(`${d.is_new?'✅ 创建':'📎 追加'} "${d.kb_name}"`);
    } catch(e) { toast(e.message, true); }
}

// ── Chat ──
function updateSend() {
    const has = $('msgInput').value.trim();
    $('sendBtn').classList.toggle('ok', !!has);
    $('sendBtn').disabled = !has;
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
}

async function sendMsg() {
    const inp = $('msgInput');
    const text = inp.value.trim();
    if (!text || S.isStreaming) return;
    const c = S.convs[S.activeCid];
    if (!c?.kb_name) return toast('请先上传文件', true);

    S.isStreaming = true;
    S.convs[S.activeCid].messages.push({role:'user', content:text});
    inp.value = ''; updateSend(); autoResize(inp);
    renderChat();
    const aib = appendStreamMsg();

    try {
        const r = await fetch(API+'/api/chat', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body:JSON.stringify({question:text, session_id:S.sid, conv_id:S.activeCid})
        });
        if (!r.ok) { const e = await r.json(); aib.innerHTML = '❌ '+esc(e.error||'失败'); S.isStreaming = false; return; }

        let full = '', src = '';
        const reader = r.body.getReader();
        const dec = new TextDecoder();
        let buf = '';
        while (true) {
            const {done, value} = await reader.read();
            if (done) break;
            buf += dec.decode(value, {stream:true});
            const lines = buf.split('\n'); buf = lines.pop();
            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                try {
                    const d = JSON.parse(line.slice(6));
                    if (d.type === 'sources' && d.sources) {
                        src = '<div class="src-box"><div class="src-title">📖 引用来源</div>'
                            + d.sources.map(s=>`<div class="src-item">${esc(s)}</div>`).join('') + '</div>';
                    } else if (d.type === 'token') {
                        full += d.content;
                        aib.innerHTML = toMarkdown(full) + src;
                        scrollDown();
                    }
                } catch(e) {}
            }
        }
        S.convs[S.activeCid].messages.push({role:'assistant', content:full, sources:src});
    } catch(e) {
        aib.innerHTML = '❌ '+esc(e.message);
    }
    S.isStreaming = false;
}

function appendStreamMsg() {
    const el = $('chatInner');
    const d = E('div', 'msg assistant');
    d.innerHTML = '<div class="avt">AI</div><div class="bub"><div class="typing"><span></span><span></span><span></span></div></div>';
    el.appendChild(d);
    scrollDown();
    return d.querySelector('.bub');
}

// Drag & drop
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer?.files?.[0]; if (f) uploadFile(f); });
document.addEventListener('paste', e => {
    const items = e.clipboardData?.items;
    for (const item of items||[]) {
        if (item.kind === 'file') { e.preventDefault(); uploadFile(item.getAsFile()); return; }
    }
});

init();
</script>
</body>
</html>
